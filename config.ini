# =============================================================================
# Instacart Recommender — config.ini
# =============================================================================
# Edit paths and hyperparameters here.  Do *not* hard-code them in code.
# =============================================================================

[paths]
# Where the raw Instacart parquet/csv lives.  See the Kaggle dataset:
#   https://www.kaggle.com/datasets/mohdshahnawazaadil/supermarket-superstore-dataset-bundle
raw_data         = /data/instacart/Instacart_TrainData.parquet

# Where trained artefacts, plots, and predictions land.  Relative paths
# resolve to the project root, so an `artifacts/` folder is created next
# to this file on first run.
artifacts_dir    = artifacts
models_dir       = artifacts/models
plots_dir        = artifacts/plots
logs_dir         = artifacts/logs
predictions_dir  = artifacts/predictions

[data]
# Minimum distinct products per user to keep them in the active cohort.
min_user_items             = 10
# Fraction of products held out per user for the test fold.
test_ratio                 = 0.2
# Seed for the per-user shuffle — change with care: affects all results.
random_state               = 42
# Same as min_user_items; kept for symmetry with the notebook.  Must be
# <= min_user_items.
active_user_min_products   = 10
# Optional cap on how many users participate in evaluation.  Use 10000
# to mirror the notebook, or `none` / empty for the full test set.
sample_size                = 10000

[als]
# Hyperparameters of the implicit.als.AlternatingLeastSquares model.
factors         = 128
regularization  = 0.01
iterations      = 30
alpha           = 40.0
use_gpu         = false
num_threads     = 4

[fpgrowth]
# Hyperparameters of the mlxtend FP-Growth association-rule miner.
min_support     = 0.01
min_confidence  = 0.2
min_lift        = 1.0
max_len         = 3
top_n           = 10
use_colnames    = true

[eval]
# K values for ranking metrics.
k_values        = 5, 10, 20
# Parallel workers.  -1 == "all cores".
n_jobs          = -1
# Optional cap on the evaluation cohort.  `none` = use the full set.
sample_size     = 10000

[api]
host    = 0.0.0.0
port    = 8000
title   = Instacart Recommender API
version = 0.1.0

[viz]
# Brand colours used across the dashboards.
palette_ndcg        = #4361EE
palette_mrr         = #3A86FF
palette_recall      = #06D6A0
palette_precision   = #F77F00
brand_color         = #05ad46
# Output resolution & figure sizes.
dpi                 = 150
figsize_dashboard   = 20, 14
figsize_inference   = 18, 12