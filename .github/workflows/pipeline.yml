# =============================================================================
# Instacart Recommender — pipeline.yml
# =============================================================================
# End-to-end data + training + inference pipeline definition.
#
# The structure is intentionally platform-agnostic: a simple orchestrator
# (or a future Airflow / Prefect / Dagster deployment) can step through
# the `stages` list.  Each stage declares:
#   * id              — unique stage identifier
#   * module          — Python module to import (relative to the project root)
#   * entrypoint      — function name to call
#   * params          — kwargs forwarded to the entrypoint
#   * depends_on      — list of stage ids that must complete first
#   * on_failure      — one of "halt" (default), "skip", "retry"
#   * retries         — number of attempts before giving up
# =============================================================================

name: Instacart Recommender Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  smoke-tests-training:
    name: Smoke Tests - Training
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || pip install pytest pyyaml

      - name: Smoke test - ALS model training module
        run: |
          python -m pytest tests/smoke/test_als_training.py -v --tb=short

      - name: Smoke test - FPGrowth model training module
        run: |
          python -m pytest tests/smoke/test_fpgrowth_training.py -v --tb=short

  smoke-tests-inference:
    name: Smoke Tests - Inference Algorithms
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: smoke-tests-training

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || pip install pytest pyyaml

      - name: Smoke test - ALS inference algorithm
        run: |
          python -m pytest tests/smoke/test_als_inference.py -v --tb=short

      - name: Smoke test - FPGrowth inference algorithm
        run: |
          python -m pytest tests/smoke/test_fpgrowth_inference.py -v --tb=short

  api-tests:
    name: Smoke Tests - API Requests & Endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: smoke-tests-inference

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || pip install pytest pyyaml requests fastapi uvicorn

      - name: Start FastAPI server
        run: |
          nohup uvicorn api.main:app --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          echo "Waiting for API server to start..."
          sleep 5
          curl -f http://127.0.0.1:8000/health || echo "API server may not be ready yet"

      - name: Smoke test - API recommendations endpoint
        run: |
          python -m pytest tests/smoke/test_api_recommendations.py -v --tb=short

      - name: Smoke test - API inference endpoint
        run: |
          python -m pytest tests/smoke/test_api_inference.py -v --tb=short

      - name: Collect API logs
        if: always()
        run: |
          echo "=== API Server Logs ===" && tail -50 api.log || true

      - name: Upload API logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: api-logs
          path: api.log

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [ smoke-tests-training, smoke-tests-inference, api-tests ]
    if: always()

    steps:
      - name: Check job status
        run: |
          echo "====================================="
          echo "Pipeline Execution Summary"
          echo "====================================="
          echo "Smoke Tests - Training: ${{ needs.smoke-tests-training.result }}"
          echo "Smoke Tests - Inference: ${{ needs.smoke-tests-inference.result }}"
          echo "API Tests: ${{ needs.api-tests.result }}"
          echo "====================================="
          if [[ "${{ needs.smoke-tests-training.result }}" == "failure" ]] || \
             [[ "${{ needs.smoke-tests-inference.result }}" == "failure" ]] || \
             [[ "${{ needs.api-tests.result }}" == "failure" ]]; then
            echo "Pipeline failed!"
            exit 1
          else
            echo "All pipeline stages passed!"
          fi